me:
  get:
    tags: [Auth]
    operationId: getMe
    summary: Get current authenticated user
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Authenticated user identity
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Me"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
