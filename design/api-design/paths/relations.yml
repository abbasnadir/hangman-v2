me:
  get:
    tags: [Relations]
    operationId: getMyRelations
    summary: Relations of the authenticated user
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Relations fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Relation"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

request:
  post:
    tags: [Relations]
    operationId: sendRelationRequest
    summary: Send a relation request to another user
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to send request to
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "200":
        description: Request resent successfully (existing rejected relation set back to pending)
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "201":
        description: Request sent successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "409":
        description: You've sent a request to this user recently, please wait before sending another
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationConflictError"
  delete:
    tags: [Relations]
    operationId: deleteOrRejectRelation
    summary: Cancel/unfriend a relation, or reject an incoming pending request
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: User ID involved in the relation
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "200":
        description: Incoming pending request rejected successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "204":
        description: Request cancelled or relation removed successfully
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

respond:
  patch:
    tags: [Relations]
    operationId: acceptRelationRequest
    summary: Accept a relation request by another user
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Requester user ID whose pending request should be accepted
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "200":
        description: Request accepted successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
