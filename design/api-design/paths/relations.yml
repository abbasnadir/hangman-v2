me:
  get:
    tags: [Relations]
    operationId: getMyRelations
    summary: Relations of the authenticated user
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Relations fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Relation"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

requestById:
  post:
    tags: [Relations]
    operationId: sendRelationRequest
    summary: Send a relation request to another user
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to send request to
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "200":
        description: Request sent successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "409":
        description: You've sent a request to this user recently, please wait before sending another
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationConflictError"

request:
  delete:
    tags: [Relations]
    operationId: cancelRelationRequest
    summary: Cancel a request
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: query
        required: true
        description: Request ID to cancel
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "204":
        description: Request cancelled successfully
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

respond:
  patch:
    tags: [Relations]
    operationId: respondRelationRequest
    summary: Accept/reject a relation request by another user
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: query
        required: true
        description: ID of the relation to accept/reject
        schema:
          $ref: "../components/schemas.yml#/ID"
      - name: action
        in: query
        required: true
        description: Action to perform on the request
        schema:
          type: string
          enum: ["accept", "reject"]
    responses:
      "200":
        description: Request responded to successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/RelationRequest"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
