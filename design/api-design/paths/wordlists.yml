default:
  get:
    tags: [Wordlists]
    operationId: getDefaultWordlists
    summary: View default wordlists
    responses:
      "200":
        description: Default wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

search:
  get:
    tags: [Wordlists]
    operationId: searchWordlists
    summary: Search for wordlists
    security:
      - bearerAuth: []
    parameters:
      - name: q
        in: query
        required: true
        description: Search query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Maximum number of results to return
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number to return
    responses:
      "200":
        description: Wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

me:
  get:
    tags: [Wordlists]
    operationId: getMyWordlists
    summary: Wordlists of the authenticated user
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
  post:
    tags: [Wordlists]
    operationId: createWordlist
    summary: Add a wordlist for the authenticated user
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yml#/WordlistCreateInput"
    responses:
      "201":
        description: Wordlist added successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
  patch:
    tags: [Wordlists]
    operationId: updateWordlist
    summary: Update authenticated user's wordlist
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yml#/WordlistUpdateInput"
    responses:
      "200":
        description: Wordlist updated successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
  delete:
    tags: [Wordlists]
    operationId: deleteWordlist
    summary: Delete a wordlist by id
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yml#/WordlistDeleteInput"
    responses:
      "204":
        description: Wordlist deleted successfully
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
