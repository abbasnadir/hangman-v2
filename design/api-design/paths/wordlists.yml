default:
  get:
    tags: [Wordlists]
    operationId: getDefaultWordlists
    summary: View default wordlists
    responses:
      "200":
        description: Default wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

search:
  get:
    tags: [Wordlists]
    operationId: searchWordlists
    summary: Search for wordlists
    security:
      - bearerAuth: []
    parameters:
      - name: q
        in: query
        required: true
        description: Search query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        description: Maximum number of results to return
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number to return
    responses:
      "200":
        description: Wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"

me:
  get:
    tags: [Wordlists]
    operationId: getMyWordlists
    summary: Wordlists of the authenticated user
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Wordlists fetched successfully
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
  put:
    tags: [Wordlists]
    operationId: createWordlist
    summary: Add a wordlist for the authenticated user
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas.yml#/Wordlist"
    responses:
      "201":
        description: Wordlist added successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "409":
        description: Wordlist with that name already exists
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Error"
  patch:
    tags: [Wordlists]
    operationId: updateWordlist
    summary: Update authenticated user's wordlist
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - type: object
                description: Wordlist update payload
                required:
                  - id
                properties:
                  id:
                    $ref: "../components/schemas.yml#/ID"
                  name:
                    type: string
                    example: "@3.,wordlist"
                  words:
                    $ref: "../components/schemas.yml#/Words"
                  is_public:
                    type: boolean
              - anyOf:
                  - required: [name]
                  - required: [words]
                  - required: [is_public]
    responses:
      "200":
        description: Wordlist updated successfully
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Wordlist"
      "400":
        $ref: "../components/responses.yml#/BadRequest"
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
      "409":
        description: Wordlist with that name already exists or is public
        content:
          application/json:
            schema:
              $ref: "../components/schemas.yml#/Error"
      "429":
        $ref: "../components/responses.yml#/TooManyRequests"
  delete:
    tags: [Wordlists]
    operationId: deleteWordlist
    summary: Delete a wordlist by id
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: query
        required: true
        description: Wordlist ID to delete
        schema:
          $ref: "../components/schemas.yml#/ID"
    responses:
      "204":
        description: Wordlist deleted successfully
      "401":
        $ref: "../components/responses.yml#/Unauthorized"
      "404":
        $ref: "../components/responses.yml#/NotFound"
